<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Poker Range Builder</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel2: #1f2937;
        --line: #334155;
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --unset: #111827;
        --fold: #3b82f6;
        --raise: #ef4444;
        --call: #22c55e;
        --cell: min(5.6vw, 52px);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #020617, var(--bg));
        color: var(--text);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
      }
      .app {
        width: min(1500px, 100%);
        margin: auto;
        padding: 20px;
      }
      .version {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-align: right;
        margin-bottom: 8px;
      }
      .header {
        margin-bottom: 16px;
      }
      h1 {
        font-size: clamp(24px, 3vw, 36px);
        margin: 0 0 6px;
      }
      .subtitle {
        margin: 0;
        color: var(--muted);
      }
      .scenario {
        padding: 16px 0;
        margin-bottom: 18px;
      }
      .scenario-main {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) minmax(140px, 220px);
        gap: 12px;
        align-items: end;
      }
      .scenario-secondary {
        display: grid;
        grid-template-columns: minmax(360px, 1fr) auto;
        gap: 12px;
        align-items: end;
        margin-top: 12px;
      }
      .actions,
      .toolbar,
      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .actions {
        justify-content: flex-end;
        align-self: end;
      }
      .field {
        margin-bottom: 12px;
      }
      .scenario-main .field,
      .scenario-secondary .field {
        margin-bottom: 0;
      }
      .prior-actions {
        display: grid;
        gap: 8px;
      }
      .prior-action-row {
        display: grid;
        grid-template-columns: minmax(90px, 120px) minmax(110px, 150px) minmax(100px, 140px) auto;
        gap: 8px;
        align-items: center;
      }
      .prior-action-row .mini {
        height: 42px;
      }
      .prior-action-size-wrap {
        position: relative;
      }
      .prior-action-size-wrap::after {
        content: "bb";
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 12px;
        pointer-events: none;
      }
      .prior-action-size {
        padding-right: 34px;
      }
      .prior-action-size:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .prior-action-add {
        width: max-content;
        margin-top: 8px;
      }
      label {
        display: block;
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 5px;
      }
      input,
      select,
      textarea {
        width: 100%;
        background: #0b1220;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 10px;
        outline: none;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
      }
      textarea {
        min-height: 76px;
        resize: vertical;
      }
      details {
        margin-top: 12px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
      }
      summary {
        width: max-content;
        cursor: pointer;
        font-weight: 800;
        padding: 7px 10px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--panel2);
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(620px, 1fr) minmax(300px, 380px);
        gap: 18px;
        align-items: start;
      }
      .range {
        padding: 18px 0;
        overflow: auto;
      }
      .toolbar {
        margin-bottom: 14px;
      }
      .btn,
      .action-btn,
      .mini {
        border: 1px solid var(--line);
        color: var(--text);
        background: var(--panel2);
        border-radius: 10px;
        padding: 9px 12px;
        cursor: pointer;
        font-weight: 700;
      }
      .primary {
        border: 0;
        color: #082f49;
        background: var(--accent);
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 800;
      }
      .action-btn.active {
        outline: 3px solid rgba(255, 255, 255, 0.15);
        border-color: white;
      }
      .action-btn[data-action="raise"] {
        background: var(--raise);
      }
      .action-btn[data-action="call"] {
        background: var(--call);
      }
      .action-btn[data-action="fold"] {
        background: var(--fold);
      }
      .action-btn[data-action="mix_raise_call"] {
        background: linear-gradient(
          to right,
          var(--raise) 0 50%,
          var(--call) 50% 100%
        );
      }
      .action-btn[data-action="mix_raise_fold"] {
        background: linear-gradient(
          to right,
          var(--raise) 0 50%,
          var(--fold) 50% 100%
        );
      }
      .action-btn[data-action="mix_call_fold"] {
        background: linear-gradient(
          to right,
          var(--call) 0 50%,
          var(--fold) 50% 100%
        );
      }
      .grid-wrap {
        display: inline-block;
        user-select: none;
        touch-action: none;
      }
      .range-grid {
        display: grid;
        grid-template-columns: repeat(13, var(--cell));
        grid-template-rows: repeat(13, var(--cell));
        gap: 3px;
        padding: 3px;
        background: #020617;
        border: 1px solid var(--line);
        border-radius: 12px;
      }
      .hand {
        position: relative;
        border: 1px solid #475569;
        border-radius: 7px;
        background: var(--unset);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: clamp(10px, 1.2vw, 14px);
        font-weight: 800;
        cursor: pointer;
        overflow: hidden;
      }
      .hand.selected {
        outline: 3px solid white;
        outline-offset: -3px;
      }
      .hand[data-action="fold"] {
        background: var(--fold);
      }
      .hand[data-action="call"] {
        background: var(--call);
      }
      .hand[data-action="raise"],
      .hand[data-action="open"] {
        background: var(--raise);
      }
      .freq {
        position: absolute;
        right: 3px;
        bottom: 1px;
        font-size: 9px;
      }
      .side {
        display: grid;
        gap: 14px;
      }
      .card {
        padding: 16px;
        background: rgba(17, 24, 39, 0.94);
        border: 1px solid var(--line);
        border-radius: 16px;
      }
      .section-title {
        margin: 0 0 12px;
        font-size: 17px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 9px;
      }
      .stat {
        border: 1px solid var(--line);
        background: #0b1220;
        border-radius: 10px;
        padding: 10px;
      }
      .stat strong {
        display: block;
        font-size: 22px;
      }
      .legend {
        display: grid;
        gap: 7px;
        margin-top: 12px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }
      .dot {
        width: 14px;
        height: 14px;
        border-radius: 4px;
      }
      .saved-list {
        display: grid;
        gap: 8px;
        max-height: 230px;
        overflow: auto;
      }
      .saved-item {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto auto;
        gap: 6px;
        align-items: center;
        border: 1px solid var(--line);
        background: #0b1220;
        border-radius: 10px;
        padding: 8px;
      }
      .saved-position {
        min-width: 44px;
        padding: 5px 8px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel2);
        color: var(--text);
        text-align: center;
        font-size: 12px;
        font-weight: 700;
      }
      .saved-name {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        font-weight: 700;
      }
      .mini {
        padding: 5px 8px;
        font-size: 12px;
      }
      .empty {
        color: var(--muted);
        font-size: 13px;
      }
      .status {
        min-height: 22px;
        margin-top: 10px;
        color: #7dd3fc;
        font-size: 13px;
      }
      @media (max-width: 1050px) {
        .scenario-main {
          grid-template-columns: 1fr 1fr;
        }
        .scenario-secondary {
          grid-template-columns: 1fr;
        }
        .actions {
          justify-content: flex-start;
        }
        .layout {
          grid-template-columns: 1fr;
        }
        .side {
          grid-template-columns: repeat(2, minmax(280px, 1fr));
        }
      }
      @media (max-width: 700px) {
        .app {
          padding: 8px;
        }
        .scenario-main,
        .scenario-secondary {
          grid-template-columns: 1fr;
        }
        .prior-action-row {
          grid-template-columns: 86px minmax(90px, 1fr) minmax(86px, 0.8fr) auto;
        }
        .layout {
          display: block;
        }
        .range {
          padding: 0;
          overflow: visible;
        }
        .range-grid {
          width: calc(100vw - 16px);
          grid-template-columns: repeat(13, minmax(0, 1fr));
          grid-template-rows: repeat(13, auto);
          gap: 0;
          padding: 0;
          background: transparent;
          border: 0;
        }
        .hand {
          width: 100%;
          aspect-ratio: 1;
          border-radius: 0;
          font-size: clamp(7px, 2.35vw, 11px);
        }
        .side {
          grid-template-columns: 1fr;
          margin-top: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="version">Version v1.11.0</div>
      <header class="header">
        <h1>Poker Range Builder</h1>
        <p class="subtitle">
          13×13のハンドマトリクスをクリックまたはドラッグしてレンジを作成します。
        </p>
      </header>
      <section class="scenario">
        <h2 class="section-title">シチュエーション入力</h2>
        <div class="scenario-main">
          <div class="field">
            <label for="rangeName">レンジ名</label
            ><input id="rangeName" type="text" placeholder="例：Open 2.3bb" />
          </div>
          <div class="field">
            <label for="position">ポジション</label
            ><select id="position">
              <option value="">未設定</option>
              <option>UTG</option>
              <option>HJ</option>
              <option>CO</option>
              <option>BTN</option>
              <option>SB</option>
              <option>BB</option>
            </select>
          </div>
        </div>
        <div class="scenario-secondary">
          <div class="field">
            <label>自分がプレーする前の相手アクション</label>
            <div id="priorActions" class="prior-actions"></div>
            <button class="mini prior-action-add" id="addPriorActionBtn" type="button">
              ＋ 相手を追加
            </button>
          </div>
          <div class="actions">
            <button class="primary" id="saveBtn">保存</button
            ><button class="btn" id="exportPngBtn">PNG出力</button
            ><button class="btn" id="exportJsonBtn">JSON出力</button
            ><button class="btn" id="importJsonBtn">JSON読込</button
            ><input
              id="jsonFileInput"
              type="file"
              accept=".json,application/json"
              hidden
            />
          </div>
        </div>
        <details>
          <summary>メモを入力</summary>
          <div class="field" style="margin-top: 12px">
            <label for="notes">メモ</label
            ><textarea
              id="notes"
              placeholder="レーキ、スタック、相手傾向など"
            ></textarea>
          </div>
        </details>
        <div id="status" class="status"></div>
      </section>
      <div class="layout">
        <section class="range">
          <div class="toolbar">
            <button class="action-btn active" data-action="raise">
              Bet / Raise</button
            ><button class="action-btn" data-action="call">Call</button
            ><button class="action-btn" data-action="mix_raise_call">
              Raise&nbsp;&nbsp;&nbsp;Call</button
            ><button class="action-btn" data-action="mix_raise_fold">
              Raise&nbsp;&nbsp;&nbsp;Fold</button
            ><button class="action-btn" data-action="mix_call_fold">
              Call&nbsp;&nbsp;&nbsp;Fold</button
            ><button class="action-btn" data-action="fold">Fold</button
            ><button class="btn" id="selectAllBtn">全選択</button
            ><button class="btn" id="selectUnsetBtn">未入力選択</button
            ><button class="btn" id="clearAllBtn">全解除</button>
          </div>
          <div class="grid-wrap">
            <div id="rangeGrid" class="range-grid"></div>
          </div>
        </section>
        <aside class="side">
          <section class="card">
            <h2 class="section-title">選択セル設定</h2>
            <div class="field">
              <label for="frequency">頻度（0〜100%）</label
              ><input
                id="frequency"
                type="number"
                min="0"
                max="100"
                value="100"
              />
            </div>
            <div class="button-row">
              <button class="primary" id="applyFrequencyBtn">
                選択セルへ適用</button
              ><button class="btn" id="clearSelectionBtn">選択解除</button>
            </div>
            <p class="empty">
              Shift＋クリックで複数選択できます。スペースキーを押しながらクリック／ドラッグすると未入力へ戻せます。
            </p>
          </section>
          <section class="card">
            <h2 class="section-title">集計</h2>
            <div class="stats">
              <div class="stat">コンボ数<strong id="comboCount">0</strong></div>
              <div class="stat">
                レンジ割合<strong id="rangePercent">0.0%</strong>
              </div>
              <div class="stat">ハンド数<strong id="handCount">0</strong></div>
              <div class="stat">
                加重コンボ<strong id="weightedCombos">0.0</strong>
              </div>
            </div>
            <div class="legend">
              <div class="legend-item">
                <span class="dot" style="background: var(--raise)"></span>Bet /
                Raise
              </div>
              <div class="legend-item">
                <span class="dot" style="background: var(--call)"></span>Call
              </div>
              <div class="legend-item">
                <span
                  class="dot"
                  style="
                    background: linear-gradient(
                      to right,
                      var(--raise) 0 50%,
                      var(--call) 50% 100%
                    );
                  "
                ></span
                >Raise / Call
              </div>
              <div class="legend-item">
                <span
                  class="dot"
                  style="
                    background: linear-gradient(
                      to right,
                      var(--raise) 0 50%,
                      var(--fold) 50% 100%
                    );
                  "
                ></span
                >Raise / Fold
              </div>
              <div class="legend-item">
                <span
                  class="dot"
                  style="
                    background: linear-gradient(
                      to right,
                      var(--call) 0 50%,
                      var(--fold) 50% 100%
                    );
                  "
                ></span
                >Call / Fold
              </div>
              <div class="legend-item">
                <span class="dot" style="background: var(--fold)"></span>Fold
              </div>
            </div>
          </section>
          <section class="card">
            <h2 class="section-title">保存済みレンジ</h2>
            <div id="savedList" class="saved-list"></div>
          </section>
        </aside>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "YOUR_SUPABASE_URL";
      const SUPABASE_PUBLISHABLE_KEY = "YOUR_SUPABASE_PUBLISHABLE_KEY";
      const SUPABASE_TABLE = "poker_ranges";
      const LOCAL_STORAGE_KEY = "pokerRangeBuilder.savedRanges";

      const isSupabaseConfigured =
        SUPABASE_URL.startsWith("https://") &&
        !SUPABASE_URL.includes("YOUR_SUPABASE_URL") &&
        SUPABASE_PUBLISHABLE_KEY &&
        !SUPABASE_PUBLISHABLE_KEY.includes("YOUR_SUPABASE_PUBLISHABLE_KEY");

      const supabaseClient = isSupabaseConfigured
        ? window.supabase.createClient(
            SUPABASE_URL,
            SUPABASE_PUBLISHABLE_KEY,
          )
        : null;

      let cloudUserId = null;
      let savedRangesCache = [];

      const ranks = [
          "A",
          "K",
          "Q",
          "J",
          "T",
          "9",
          "8",
          "7",
          "6",
          "5",
          "4",
          "3",
          "2",
        ],
        grid = document.getElementById("rangeGrid"),
        buttons = [...document.querySelectorAll(".action-btn")],
        selected = new Set(),
        data = {};
      const positions = ["UTG", "HJ", "CO", "BTN", "SB", "BB"];
      const priorActionsEl = document.getElementById("priorActions");

      function createPriorActionRow(value = {}) {
        const row = document.createElement("div");
        row.className = "prior-action-row";

        const positionSelect = document.createElement("select");
        positionSelect.className = "prior-action-position";
        positionSelect.innerHTML = `
          <option value="">ポジション</option>
          ${positions
            .map(
              (position) =>
                `<option value="${position}">${position}</option>`,
            )
            .join("")}
        `;
        positionSelect.value = value.position || "";

        const actionSelect = document.createElement("select");
        actionSelect.className = "prior-action-type";
        actionSelect.innerHTML = `
          <option value="raise">Raise</option>
          <option value="call">Call</option>
          <option value="fold">Fold</option>
          <option value="all_in">All-in</option>
        `;

        const legacyAction = String(value.action || "").trim();
        const normalizedLegacyAction = legacyAction.toLowerCase();
        const supportedActions = ["raise", "call", "fold", "all_in"];
        actionSelect.value = supportedActions.includes(normalizedLegacyAction)
          ? normalizedLegacyAction
          : "raise";

        const sizeWrap = document.createElement("div");
        sizeWrap.className = "prior-action-size-wrap";

        const sizeInput = document.createElement("input");
        sizeInput.className = "prior-action-size";
        sizeInput.type = "number";
        sizeInput.min = "0";
        sizeInput.step = "0.1";
        sizeInput.inputMode = "decimal";
        sizeInput.placeholder = "例：2.3";
        sizeInput.value = value.amount ?? "";
        sizeWrap.appendChild(sizeInput);

        const updateSizeState = () => {
          const requiresSize = actionSelect.value === "raise";
          sizeInput.disabled = !requiresSize;
          if (!requiresSize) sizeInput.value = "";
        };
        actionSelect.addEventListener("change", updateSizeState);
        updateSizeState();

        const removeButton = document.createElement("button");
        removeButton.className = "mini";
        removeButton.type = "button";
        removeButton.textContent = "削除";
        removeButton.onclick = () => {
          row.remove();
          if (!priorActionsEl.children.length) createPriorActionRow();
        };

        row.append(positionSelect, actionSelect, sizeWrap, removeButton);
        priorActionsEl.appendChild(row);
      }

      function getPriorActions() {
        return [...priorActionsEl.querySelectorAll(".prior-action-row")]
          .map((row) => {
            const action = row.querySelector(".prior-action-type").value;
            const amountInput = row.querySelector(".prior-action-size");
            const amount = action === "raise"
              ? amountInput.value.trim()
              : "";
            return {
              position: row.querySelector(".prior-action-position").value,
              action,
              amount,
            };
          })
          .filter((item) => item.position || item.amount || item.action !== "raise");
      }

      function setPriorActions(items = []) {
        priorActionsEl.innerHTML = "";
        const normalized = items.length ? items : [{}];
        normalized.forEach(createPriorActionRow);
      }

      addPriorActionBtn.onclick = () => createPriorActionRow();
      let active = "raise",
        drag = false,
        mode = "paint",
        space = false,
        pointer = null,
        last = null;
      const handName = (r, c) =>
        r === c
          ? ranks[r] + ranks[c]
          : r < c
            ? ranks[r] + ranks[c] + "s"
            : ranks[c] + ranks[r] + "o";
      const combos = (h) => (h.length === 2 ? 6 : h.endsWith("s") ? 4 : 12);
      document.addEventListener("keydown", (e) => {
        if (
          e.code === "Space" &&
          !["INPUT", "TEXTAREA", "SELECT"].includes(
            document.activeElement?.tagName,
          )
        ) {
          space = true;
          e.preventDefault();
        }
      });
      document.addEventListener("keyup", (e) => {
        if (e.code === "Space") space = false;
      });
      function createGrid() {
        for (let r = 0; r < 13; r++)
          for (let c = 0; c < 13; c++) {
            const h = handName(r, c);
            data[h] = { action: "unset", frequency: 0 };
            const cell = document.createElement("button");
            cell.className = "hand";
            cell.dataset.hand = h;
            cell.dataset.action = "unset";
            cell.innerHTML = `<span>${h}</span><span class="freq"></span>`;
            cell.onpointerdown = (e) => {
              e.preventDefault();
              if (pointer !== null) return;
              pointer = e.pointerId;
              drag = true;
              last = h;
              cell.setPointerCapture?.(e.pointerId);
              if (e.shiftKey && e.pointerType === "mouse") {
                selected.has(h) ? selected.delete(h) : selected.add(h);
                refreshSelection();
                return;
              }
              selected.clear();
              refreshSelection();
              const clear = space || data[h].action === active;
              mode = clear ? "erase" : "paint";
              apply(h, clear ? "unset" : active);
            };
            cell.onpointermove = (e) => {
              if (!drag || e.pointerId !== pointer) return;
              const t = document
                  .elementFromPoint(e.clientX, e.clientY)
                  ?.closest(".hand"),
                th = t?.dataset.hand;
              if (!th || th === last) return;
              last = th;
              apply(th, mode === "erase" || space ? "unset" : active);
            };
            cell.ondblclick = () => {
              selected.clear();
              selected.add(h);
              refreshSelection();
              document.getElementById("frequency").value =
                data[h].frequency || 100;
            };
            grid.appendChild(cell);
          }
      }
      function finish(e) {
        if (
          pointer !== null &&
          e?.pointerId !== undefined &&
          e.pointerId !== pointer
        )
          return;
        drag = false;
        pointer = null;
        last = null;
      }
      document.addEventListener("pointerup", finish);
      document.addEventListener("pointercancel", finish);
      function refreshSelection() {
        document
          .querySelectorAll(".hand")
          .forEach((c) =>
            c.classList.toggle("selected", selected.has(c.dataset.hand)),
          );
      }
      function apply(h, a) {
        const f =
          a === "unset"
            ? 0
            : Number(document.getElementById("frequency").value || 100);
        data[h] = { action: a, frequency: Math.max(0, Math.min(100, f)) };
        render(h);
        stats();
      }
      function render(h) {
        const c = document.querySelector(`[data-hand="${h}"]`),
          d = data[h],
          f = Math.max(0, Math.min(100, Number(d.frequency || 0))),
          single = {
            unset: "var(--unset)",
            fold: "var(--fold)",
            call: "var(--call)",
            raise: "var(--raise)",
            open: "var(--raise)",
          },
          mixed = {
            mix_raise_call: ["var(--raise)", "var(--call)"],
            mix_raise_fold: ["var(--raise)", "var(--fold)"],
            mix_call_fold: ["var(--call)", "var(--fold)"],
          };

        c.dataset.action = d.action;
        c.querySelector(".freq").textContent = "";

        if (d.action === "unset") {
          c.style.background = "var(--unset)";
        } else if (mixed[d.action]) {
          const [left, right] = mixed[d.action];
          c.style.background = `linear-gradient(to right, ${left} 0 ${f}%, ${right} ${f}% 100%)`;
        } else if (f >= 100) {
          c.style.background = single[d.action] || single.unset;
        } else if (f <= 0) {
          c.style.background = "var(--unset)";
        } else {
          const color = single[d.action] || single.unset;
          c.style.background = `linear-gradient(to right, ${color} 0 ${f}%, var(--unset) ${f}% 100%)`;
        }
      }
      function stats() {
        let raw = 0,
          w = 0,
          n = 0;
        Object.entries(data).forEach(([h, d]) => {
          if (["unset", "fold"].includes(d.action) || d.frequency <= 0) return;
          const c = combos(h);
          raw += c;
          w += (c * d.frequency) / 100;
          n++;
        });
        comboCount.textContent = raw;
        weightedCombos.textContent = w.toFixed(1);
        rangePercent.textContent = `${((w / 1326) * 100).toFixed(1)}%`;
        handCount.textContent = n;
      }
      function applyActionToSelection(action) {
        if (!selected.size) return;

        const inputFrequency = Math.max(
          0,
          Math.min(100, Number(frequency.value || 100)),
        );

        selected.forEach((h) => {
          data[h] = {
            action,
            frequency: inputFrequency,
          };
          render(h);
        });

        stats();
        status.textContent = `選択中の${selected.size}ハンドへ${actionLabel(action)}を適用しました。`;
      }

      function actionLabel(action) {
        const labels = {
          raise: "Bet / Raise",
          call: "Call",
          mix_raise_call: "Raise / Call",
          mix_raise_fold: "Raise / Fold",
          mix_call_fold: "Call / Fold",
          fold: "Fold",
        };
        return labels[action] || action;
      }

      buttons.forEach(
        (b) =>
          (b.onclick = () => {
            active = b.dataset.action;
            buttons.forEach((x) => x.classList.toggle("active", x === b));
            applyActionToSelection(active);
          }),
      );
      selectAllBtn.onclick = () => {
        selected.clear();
        Object.keys(data).forEach((h) => selected.add(h));
        refreshSelection();
        status.textContent = "全ハンドを選択しました。";
      };
      selectUnsetBtn.onclick = () => {
        selected.clear();
        Object.entries(data).forEach(([h, handData]) => {
          if (handData.action === "unset") selected.add(h);
        });
        refreshSelection();
        status.textContent = selected.size
          ? `未入力の${selected.size}ハンドを選択しました。`
          : "未入力のハンドはありません。";
      };
      clearSelectionBtn.onclick = () => {
        selected.clear();
        refreshSelection();
      };
      clearAllBtn.onclick = () => {
        Object.keys(data).forEach((h) => {
          data[h] = { action: "unset", frequency: 0 };
          render(h);
        });
        selected.clear();
        refreshSelection();
        stats();
        status.textContent = "全ハンドを未入力へ戻しました。";
      };
      applyFrequencyBtn.onclick = () => {
        const v = Math.max(0, Math.min(100, Number(frequency.value)));
        if (!selected.size) {
          status.textContent = "先にセルを選択してください。";
          return;
        }
        selected.forEach((h) => {
          if (data[h].action === "unset" && v > 0) data[h].action = active;
          data[h].frequency = v;
          if (v === 0 && !data[h].action.startsWith("mix_")) {
            data[h].action = "unset";
          }
          render(h);
        });
        stats();
      };
      function title(position, name) {
        const n = name.trim() || "名称未設定";
        return position ? `${position}_${n}` : n;
      }
      function baseName(p) {
        if (p.baseName) return p.baseName;
        const pre = p.position ? `${p.position}_` : "";
        return pre && p.name?.startsWith(pre)
          ? p.name.slice(pre.length)
          : p.name || "";
      }
      function payload() {
        const b = rangeName.value.trim() || "名称未設定",
          p = position.value;
        return {
          version: 2,
          baseName: b,
          name: title(p, b),
          position: p,
          priorActions: getPriorActions(),
          notes: notes.value.trim(),
          updatedAt: new Date().toISOString(),
          hands: structuredClone(data),
        };
      }
      function load(p) {
        rangeName.value = baseName(p);
        position.value = p.position || "";
        const loadedPriorActions = Array.isArray(p.priorActions)
          ? p.priorActions
          : p.priorAction
            ? [{ position: "", action: "raise", amount: "" }]
            : [];
        setPriorActions(loadedPriorActions);
        notes.value = p.notes || "";
        Object.keys(data).forEach((h) => {
          const s = p.hands?.[h] || { action: "unset", frequency: 0 },
            a = s.action === "mix" ? "mix_raise_call" : s.action;
          data[h] = {
            action: a || "unset",
            frequency: Number(s.frequency || 0),
          };
          render(h);
        });
        stats();
      }
      function getLocalSaved() {
        try {
          return JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || "[]");
        } catch {
          return [];
        }
      }

      function setLocalSaved(items) {
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(items));
      }

      function normalizeSavedRange(row) {
        if (row?.range_data) {
          return {
            ...row.range_data,
            cloudId: row.id,
          };
        }
        return row;
      }

      async function ensureCloudSession() {
        if (!supabaseClient) return false;

        const {
          data: { session },
          error: sessionError,
        } = await supabaseClient.auth.getSession();
        if (sessionError) throw sessionError;

        if (session?.user) {
          cloudUserId = session.user.id;
          return true;
        }

        const { data: signInData, error: signInError } =
          await supabaseClient.auth.signInAnonymously();
        if (signInError) throw signInError;

        cloudUserId = signInData.user?.id || null;
        return Boolean(cloudUserId);
      }

      async function fetchCloudSaved() {
        const ready = await ensureCloudSession();
        if (!ready) return [];

        const { data: rows, error } = await supabaseClient
          .from(SUPABASE_TABLE)
          .select("id, range_name, range_data, updated_at")
          .order("updated_at", { ascending: false });
        if (error) throw error;

        return (rows || []).map(normalizeSavedRange);
      }

      async function upsertCloudRange(rangePayload) {
        const ready = await ensureCloudSession();
        if (!ready) throw new Error("Supabaseへ接続できませんでした。");

        const existing = savedRangesCache.find(
          (item) => item.name === rangePayload.name,
        );
        const record = {
          user_id: cloudUserId,
          range_name: rangePayload.name,
          range_data: rangePayload,
          updated_at: new Date().toISOString(),
        };
        if (existing?.cloudId) record.id = existing.cloudId;

        const { data: rows, error } = await supabaseClient
          .from(SUPABASE_TABLE)
          .upsert(record, { onConflict: "user_id,range_name" })
          .select("id, range_name, range_data, updated_at");
        if (error) throw error;

        return normalizeSavedRange(rows?.[0] || { range_data: rangePayload });
      }

      async function deleteCloudRange(rangeItem) {
        if (!rangeItem.cloudId) return;
        const ready = await ensureCloudSession();
        if (!ready) throw new Error("Supabaseへ接続できませんでした。");

        const { error } = await supabaseClient
          .from(SUPABASE_TABLE)
          .delete()
          .eq("id", rangeItem.cloudId);
        if (error) throw error;
      }

      async function migrateLocalRangesToCloud(localItems, cloudItems) {
        const cloudNames = new Set(cloudItems.map((item) => item.name));
        const targets = localItems.filter((item) => !cloudNames.has(item.name));
        if (!targets.length) return cloudItems;

        const migrated = [...cloudItems];
        for (const item of targets) {
          migrated.push(await upsertCloudRange(item));
        }
        return migrated.sort(
          (a, b) =>
            new Date(b.updatedAt || 0).getTime() -
            new Date(a.updatedAt || 0).getTime(),
        );
      }

      async function initializeSavedRanges() {
        const localItems = getLocalSaved();
        savedRangesCache = localItems;
        renderSaved();

        if (!isSupabaseConfigured) {
          status.textContent =
            "Supabase未設定のため、現在はブラウザ内へ保存しています。";
          return;
        }

        try {
          status.textContent = "クラウド保存を準備しています…";
          const cloudItems = await fetchCloudSaved();
          savedRangesCache = await migrateLocalRangesToCloud(
            localItems,
            cloudItems,
          );
          setLocalSaved(savedRangesCache);
          renderSaved();
          status.textContent = "Supabaseとの同期が完了しました。";
        } catch (error) {
          console.error(error);
          status.textContent =
            "Supabaseへ接続できなかったため、ブラウザ内のデータを表示しています。";
        }
      }

      saveBtn.onclick = async () => {
        const p = payload();
        saveBtn.disabled = true;

        try {
          if (isSupabaseConfigured) {
            status.textContent = `「${p.name}」をクラウドへ保存しています…`;
            const saved = await upsertCloudRange(p);
            const index = savedRangesCache.findIndex(
              (item) => item.name === p.name,
            );
            if (index >= 0) savedRangesCache[index] = saved;
            else savedRangesCache.unshift(saved);
            status.textContent = `「${p.name}」をSupabaseへ保存しました。`;
          } else {
            const index = savedRangesCache.findIndex(
              (item) => item.name === p.name,
            );
            if (index >= 0) savedRangesCache[index] = p;
            else savedRangesCache.unshift(p);
            status.textContent = `「${p.name}」をブラウザに保存しました。`;
          }

          savedRangesCache = savedRangesCache.slice(0, 100);
          setLocalSaved(savedRangesCache);
          renderSaved();
        } catch (error) {
          console.error(error);
          const index = savedRangesCache.findIndex(
            (item) => item.name === p.name,
          );
          if (index >= 0) savedRangesCache[index] = p;
          else savedRangesCache.unshift(p);
          setLocalSaved(savedRangesCache);
          renderSaved();
          status.textContent =
            `クラウド保存に失敗したため、「${p.name}」をブラウザ内へ保存しました。`;
        } finally {
          saveBtn.disabled = false;
        }
      };

      function renderSaved() {
        const items = savedRangesCache;
        savedList.innerHTML = items.length
          ? ""
          : '<div class="empty">保存済みレンジはありません。</div>';
        items.forEach((x, i) => {
          const row = document.createElement("div");
          row.className = "saved-item";

          const displayName = baseName(x);
          const displayPosition = x.position || "未設定";

          row.innerHTML = `
            <div class="saved-position">${escapeHtml(displayPosition)}</div>
            <div class="saved-name">${escapeHtml(displayName)}</div>
            <button class="mini" data-load="${i}">読込</button>
            <button class="mini" data-delete="${i}">削除</button>
          `;

          savedList.appendChild(row);
        });
        savedList
          .querySelectorAll("[data-load]")
          .forEach((b) => (b.onclick = () => load(items[+b.dataset.load])));
        savedList.querySelectorAll("[data-delete]").forEach(
          (b) =>
            (b.onclick = async () => {
              const index = +b.dataset.delete;
              const target = items[index];
              b.disabled = true;

              try {
                if (isSupabaseConfigured) {
                  await deleteCloudRange(target);
                }
                savedRangesCache.splice(index, 1);
                setLocalSaved(savedRangesCache);
                renderSaved();
                status.textContent = `「${target.name}」を削除しました。`;
              } catch (error) {
                console.error(error);
                b.disabled = false;
                status.textContent =
                  `「${target.name}」のクラウド削除に失敗しました。`;
              }
            }),
        );
      }

      function download(blob, name) {
        const u = URL.createObjectURL(blob),
          a = document.createElement("a");
        a.href = u;
        a.download = name;
        a.click();
        URL.revokeObjectURL(u);
      }
      const clean = (n) => (n || "poker-range").replace(/[\\/:*?"<>|]/g, "_");
      exportJsonBtn.onclick = () => {
        const p = payload();
        download(
          new Blob([JSON.stringify(p, null, 2)], { type: "application/json" }),
          `${clean(p.name)}.json`,
        );
      };
      importJsonBtn.onclick = () => jsonFileInput.click();
      jsonFileInput.onchange = async (e) => {
        const f = e.target.files?.[0];
        if (f) load(JSON.parse(await f.text()));
        e.target.value = "";
      };
      exportPngBtn.onclick = () => {
        const p = payload(),
          cell = 64,
          gap = 4,
          pad = 28,
          head = 126,
          size = cell * 13 + gap * 12,
          cv = document.createElement("canvas"),
          ctx = cv.getContext("2d");
        cv.width = size + pad * 2;
        cv.height = size + pad * 2 + head;
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, cv.width, cv.height);
        const positionLabel = p.position || "未設定";
        const titleLabel = p.name || "名称未設定";
        const titleSuffix =
          p.position && titleLabel.startsWith(`${p.position}_`)
            ? titleLabel.slice(p.position.length)
            : `_${titleLabel}`;

        ctx.font = "bold 28px sans-serif";

        const positionPaddingX = 12;
        const positionBadgeHeight = 40;
        const positionBadgeWidth =
          ctx.measureText(positionLabel).width + positionPaddingX * 2;
        const positionBadgeX = pad;
        const positionBadgeY = 8;

        ctx.fillStyle = "#1f2937";
        ctx.strokeStyle = "#64748b";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(
          positionBadgeX,
          positionBadgeY,
          positionBadgeWidth,
          positionBadgeHeight,
          8,
        );
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#f8fafc";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(
          positionLabel,
          positionBadgeX + positionBadgeWidth / 2,
          positionBadgeY + positionBadgeHeight / 2,
        );

        ctx.textAlign = "left";
        ctx.fillText(
          titleSuffix,
          positionBadgeX + positionBadgeWidth + 8,
          positionBadgeY + positionBadgeHeight / 2,
        );
        const actionLabels = {
          raise: "Raise",
          call: "Call",
          fold: "Fold",
          all_in: "All-in",
        };
        const priorActionLabel = (p.priorActions || [])
          .map(({ position, action, amount }) => {
            const actionLabel = actionLabels[action] || action || "Raise";
            const sizeLabel =
              action === "raise" && amount
                ? `${amount}bb`
                : "";
            return [position, actionLabel, sizeLabel]
              .filter(Boolean)
              .join(" ");
          })
          .filter(Boolean)
          .join(" / ");
        if (priorActionLabel) {
          ctx.fillStyle = "#94a3b8";
          ctx.font = "15px sans-serif";
          ctx.textAlign = "left";
          ctx.textBaseline = "alphabetic";
          ctx.fillText(`前のアクション: ${priorActionLabel}`, pad, 78);
        }
        const colors = {
            unset: "#111827",
            fold: "#3b82f6",
            call: "#22c55e",
            raise: "#ef4444",
            open: "#ef4444",
          },
          mixed = {
            mix_raise_call: [colors.raise, colors.call],
            mix_raise_fold: [colors.raise, colors.fold],
            mix_call_fold: [colors.call, colors.fold],
          };
        for (let r = 0; r < 13; r++)
          for (let c = 0; c < 13; c++) {
            const h = handName(r, c),
              d = data[h],
              x = pad + c * (cell + gap),
              y = pad + head + r * (cell + gap);
            const frequencyValue = Math.max(
              0,
              Math.min(100, Number(d.frequency || 0)),
            );

            if (mixed[d.action]) {
              const [primaryColor, secondaryColor] = mixed[d.action];
              const primaryWidth = (cell * frequencyValue) / 100;
              ctx.fillStyle = primaryColor;
              ctx.fillRect(x, y, primaryWidth, cell);
              ctx.fillStyle = secondaryColor;
              ctx.fillRect(x + primaryWidth, y, cell - primaryWidth, cell);
            } else if (d.action === "unset" || frequencyValue <= 0) {
              ctx.fillStyle = colors.unset;
              ctx.fillRect(x, y, cell, cell);
            } else if (frequencyValue >= 100) {
              ctx.fillStyle = colors[d.action] || colors.unset;
              ctx.fillRect(x, y, cell, cell);
            } else {
              const actionWidth = (cell * frequencyValue) / 100;
              ctx.fillStyle = colors[d.action] || colors.unset;
              ctx.fillRect(x, y, actionWidth, cell);
              ctx.fillStyle = colors.unset;
              ctx.fillRect(x + actionWidth, y, cell - actionWidth, cell);
            }
            ctx.strokeStyle = "#64748b";
            ctx.strokeRect(x + 0.5, y + 0.5, cell - 1, cell - 1);
            ctx.fillStyle = "#f8fafc";
            ctx.font = "bold 17px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(h, x + cell / 2, y + cell / 2 - 3);
          }
        cv.toBlob((b) => download(b, `${clean(p.name)}.png`), "image/png");
      };
      function escapeHtml(v) {
        return String(v ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
      setPriorActions();
      createGrid();
      stats();
      initializeSavedRanges();
    </script>
  </body>
</html>
